# ============================================================
# Motion Light - Scene Restore
# ============================================================
# Turns lights on when motion is detected and restores their
# exact previous state after inactivity.
#
# Unlike typical motion-light automations, this blueprint does
# not finish by blindly turning lights off. Instead, it stores a
# temporary snapshot of the selected lights and restores that
# snapshot after the room is clear again.
#
# The snapshot is created only once per motion cycle. If motion
# re-triggers during the timeout window, the original pre-motion
# state is preserved and restored at the end.
# ============================================================

blueprint:
  name: Motion Light - Scene Restore
  description: >
    Turns lights on when motion is detected and restores their exact previous
    state after a no-motion timeout. Ideal for motion scenes, color modes, or
    other temporary light changes where you want the room to return to how it
    looked before motion started.
  domain: automation
  author: Luxus
  source_url: https://github.com/luxus/home-assistant-goodies/blob/main/blueprints/automation/motion_light_scene_restore.yaml
  homeassistant:
    min_version: 2024.6.0

  input:
    trigger_section:
      name: Trigger
      icon: mdi:motion-sensor
      input:
        motion_sensors:
          name: Motion Sensors
          description: >
            Select one or more individual motion or occupancy sensors. You can
            leave this empty and use Motion Areas instead.
          default: []
          selector:
            entity:
              multiple: true
              filter:
                - domain: binary_sensor
                  device_class: motion
                - domain: binary_sensor
                  device_class: occupancy

        motion_areas:
          name: Motion Areas (optional)
          description: >
            Optional modern area-based selection. All motion and occupancy
            sensors in the selected area(s) will be watched.
          default: []
          selector:
            area:
              multiple: true
              entity:
                - domain: binary_sensor
                  device_class: motion
                - domain: binary_sensor
                  device_class: occupancy

        no_motion_wait:
          name: No-motion wait
          description: >
            How long all watched motion sensors must stay off before the
            previous light state is restored.
          default:
            minutes: 2
          selector:
            duration:

        start_conditions:
          name: Start conditions (optional)
          description: >
            Extra conditions required to start a new motion cycle. Use this for
            time windows, only-at-night rules, occupancy checks, and similar
            constraints.
          default: []
          selector:
            condition:

    light_section:
      name: Lights
      icon: mdi:lightbulb-group
      input:
        light_target:
          name: Lights to snapshot and restore
          description: >
            Select the lights affected by this blueprint. This target is used
            for snapshot/restore and for the default light.turn_on action. You
            can select entities, devices, or entire areas.
          selector:
            target:
              entity:
                - domain: light

        motion_on_action:
          name: Motion-on action (optional)
          description: >
            Optional custom action to run when motion starts. Leave empty to use
            a simple light.turn_on on the selected light target. If you use a
            custom action, make sure it affects the same lights selected above.
          default: []
          selector:
            action:

    options_section:
      name: Options
      icon: mdi:cog
      collapsed: true
      input:
        illuminance_sensor:
          name: Illuminance sensor (optional)
          description: >
            If set, the automation only starts a new motion cycle when the lux
            value is at or below the threshold below.
          default: ""
          selector:
            entity:
              filter:
                - domain: sensor
                  device_class: illuminance

        illuminance_below:
          name: Illuminance threshold
          description: Only used if an illuminance sensor is selected.
          default: 50
          selector:
            number:
              min: 0
              max: 2000
              step: 1
              unit_of_measurement: lx
              mode: box

        turn_on_transition:
          name: Default turn-on transition
          description: >
            Transition used only when the custom motion-on action is left empty.
          default: 0
          selector:
            number:
              min: 0
              max: 30
              step: 1
              unit_of_measurement: s
              mode: slider

        restore_transition:
          name: Restore transition
          description: >
            Transition used when restoring the snapshotted light state.
          default: 0
          selector:
            number:
              min: 0
              max: 30
              step: 1
              unit_of_measurement: s
              mode: slider

trigger_variables:
  motion_sensors_input: !input motion_sensors
  motion_areas_input: !input motion_areas

triggers:
  - trigger: template
    value_template: >
      {% set explicit = motion_sensors_input if motion_sensors_input is list else ([motion_sensors_input] if motion_sensors_input else []) %}
      {% set areas = motion_areas_input if motion_areas_input is list else ([motion_areas_input] if motion_areas_input else []) %}
      {% set ns = namespace(entities=[]) %}
      {% for entity_id in explicit %}
        {% if entity_id not in ns.entities %}
          {% set ns.entities = ns.entities + [entity_id] %}
        {% endif %}
      {% endfor %}
      {% for area_id in areas %}
        {% for entity_id in area_entities(area_id) %}
          {% if entity_id.startswith('binary_sensor.') and state_attr(entity_id, 'device_class') in ['motion', 'occupancy'] and entity_id not in ns.entities %}
            {% set ns.entities = ns.entities + [entity_id] %}
          {% endif %}
        {% endfor %}
      {% endfor %}
      {% set active = namespace(any_on=false) %}
      {% for entity_id in ns.entities %}
        {% if is_state(entity_id, 'on') %}
          {% set active.any_on = true %}
        {% endif %}
      {% endfor %}
      {{ active.any_on }}
    variables:
      motion_sensors: !input motion_sensors
      motion_areas: !input motion_areas
      light_target: !input light_target
      illuminance_sensor: !input illuminance_sensor
      illuminance_below: !input illuminance_below
      motion_on_action: !input motion_on_action

variables:
  snapshot_scene_id: "{{ (this.entity_id ~ '_motion_restore') | slugify }}"
  snapshot_scene_entity: "{{ 'scene.' ~ snapshot_scene_id }}"
  motion_sensor_entities_json: >
    {% set explicit = motion_sensors if motion_sensors is list else ([motion_sensors] if motion_sensors else []) %}
    {% set areas = motion_areas if motion_areas is list else ([motion_areas] if motion_areas else []) %}
    {% set ns = namespace(entities=[]) %}
    {% for entity_id in explicit %}
      {% if entity_id not in ns.entities %}
        {% set ns.entities = ns.entities + [entity_id] %}
      {% endif %}
    {% endfor %}
    {% for area_id in areas %}
      {% for entity_id in area_entities(area_id) %}
        {% if entity_id.startswith('binary_sensor.') and state_attr(entity_id, 'device_class') in ['motion', 'occupancy'] and entity_id not in ns.entities %}
          {% set ns.entities = ns.entities + [entity_id] %}
        {% endif %}
      {% endfor %}
    {% endfor %}
    {{ ns.entities | to_json }}
  light_entities_json: >
    {% set entity_ids = light_target.get('entity_id', []) %}
    {% set entity_ids = entity_ids if entity_ids is list else ([entity_ids] if entity_ids else []) %}
    {% set device_ids = light_target.get('device_id', []) %}
    {% set device_ids = device_ids if device_ids is list else ([device_ids] if device_ids else []) %}
    {% set area_ids = light_target.get('area_id', []) %}
    {% set area_ids = area_ids if area_ids is list else ([area_ids] if area_ids else []) %}
    {% set ns = namespace(entities=[]) %}
    {% for entity_id in entity_ids %}
      {% if entity_id.startswith('light.') and entity_id not in ns.entities %}
        {% set ns.entities = ns.entities + [entity_id] %}
      {% endif %}
    {% endfor %}
    {% for device_id in device_ids %}
      {% for entity_id in device_entities(device_id) %}
        {% if entity_id.startswith('light.') and entity_id not in ns.entities %}
          {% set ns.entities = ns.entities + [entity_id] %}
        {% endif %}
      {% endfor %}
    {% endfor %}
    {% for area_id in area_ids %}
      {% for entity_id in area_entities(area_id) %}
        {% if entity_id.startswith('light.') and entity_id not in ns.entities %}
          {% set ns.entities = ns.entities + [entity_id] %}
        {% endif %}
      {% endfor %}
    {% endfor %}
    {{ ns.entities | to_json }}

conditions: []

actions:

  # Fail fast if neither explicit sensors nor motion areas resolve to anything.
  - alias: Confirm at least one motion sensor is available
    condition: template
    value_template: "{{ motion_sensor_entities_json | from_json | count > 0 }}"

  # Fail fast if the selected light target resolves to no actual light entities.
  - alias: Confirm at least one light is available
    condition: template
    value_template: "{{ light_entities_json | from_json | count > 0 }}"

  # Only apply the lux threshold when starting a brand-new motion cycle.
  # If a snapshot already exists, we are in an active cycle and should keep
  # managing that cycle even if lux later rises above the threshold.
  - alias: Optional illuminance gate for new cycles
    condition: template
    value_template: >
      {{ states(snapshot_scene_entity) not in ['unknown', 'unavailable']
         or illuminance_sensor | length == 0
         or states(illuminance_sensor) | float(999999) <= illuminance_below | float(50) }}

  # Optional extra conditions, such as time windows or sun conditions.
  # These only apply when a new motion cycle starts.
  - alias: Optional start conditions for new cycles
    choose:
      - conditions:
          - condition: template
            value_template: >
              {{ states(snapshot_scene_entity) in ['unknown', 'unavailable'] }}
        sequence:
          - condition: !input start_conditions

  # Snapshot the selected lights only on the first run of a motion cycle.
  # If the automation restarts because motion comes back during the timeout,
  # the existing snapshot is preserved so restore still returns to the real
  # pre-motion state.
  - alias: Snapshot lights before motion lighting starts
    choose:
      - conditions:
          - condition: template
            value_template: >
              {{ states(snapshot_scene_entity) in ['unknown', 'unavailable'] }}
        sequence:
          - action: scene.create
            data:
              scene_id: "{{ snapshot_scene_id }}"
              snapshot_entities: "{{ light_entities_json | from_json }}"

  # If a custom action is provided, run it.
  # Otherwise, just turn on the selected light target.
  - alias: Activate motion lighting
    choose:
      - conditions:
          - condition: template
            value_template: "{{ motion_on_action | count > 0 }}"
        sequence: !input motion_on_action
    default:
      - action: light.turn_on
        target: !input light_target
        data:
          transition: !input turn_on_transition

  # Wait until all watched sensors report no motion.
  - alias: Wait for all motion sensors to clear
    wait_template: >
      {% set active = namespace(any_on=false) %}
      {% for entity_id in motion_sensor_entities_json | from_json %}
        {% if is_state(entity_id, 'on') %}
          {% set active.any_on = true %}
        {% endif %}
      {% endfor %}
      {{ not active.any_on }}

  # Keep lights in motion mode for the configured timeout.
  - alias: Wait for the no-motion timeout
    delay: !input no_motion_wait

  # Re-check before restoring so a stale run cannot undo active motion.
  - alias: Confirm all motion sensors are still clear
    condition: template
    value_template: >
      {% set active = namespace(any_on=false) %}
      {% for entity_id in motion_sensor_entities_json | from_json %}
        {% if is_state(entity_id, 'on') %}
          {% set active.any_on = true %}
        {% endif %}
      {% endfor %}
      {{ not active.any_on }}

  # Restore the exact previous state and then delete the temporary snapshot.
  - alias: Restore previous light state
    choose:
      - conditions:
          - condition: template
            value_template: >
              {{ states(snapshot_scene_entity) not in ['unknown', 'unavailable'] }}
        sequence:
          - action: scene.turn_on
            target:
              entity_id: "{{ snapshot_scene_entity }}"
            data:
              transition: !input restore_transition
          - action: scene.delete
            target:
              entity_id: "{{ snapshot_scene_entity }}"

mode: restart
max_exceeded: silent
